<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" role="img" aria-label="Linket Agent">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="55%" stop-color="#121A2E"/>
      <stop offset="100%" stop-color="#1A2647"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#5EEAD4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#bgGrad)"/>
  <rect x="120" y="299" width="1360" height="2" fill="url(#accent)"/>

  <g transform="translate(160 160)">
    <g fill="none" stroke="url(#markGrad)" stroke-width="14" stroke-linecap="round">
      <rect x="0"  y="20" width="80" height="60" rx="30" ry="30"/>
      <rect x="55" y="0"  width="80" height="60" rx="30" ry="30"/>
    </g>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" fill="#F5F7FB">
    <text x="360" y="210" font-size="120" font-weight="700" letter-spacing="-2">Linket<tspan fill="#5EEAD4"> Agent</tspan></text>
    <text x="362" y="262" font-size="26" font-weight="400" fill="#9AA4BF" letter-spacing="3">SELF&#x2011;IMPROVING&#160;&#xB7;&#160;TOOL&#x2011;CALLING&#160;&#xB7;&#160;RUNS&#160;ANYWHERE</text>
  </g>
</svg>
